repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: mixed-line-ending
        args: ["--fix=lf"]

  # Ruff is invoked via `uv run` so the version always matches uv.lock.
  # Pinning a separate version in this file would cause drift: older
  # pre-commit-ruff still enforces deprecated rules (ANN101, PD901) that
  # the project's ruff has retired, producing CI-only false positives.
  - repo: local
    hooks:
      - id: ruff
        name: ruff (via uv)
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        language: system
        types_or: [python, pyi, jupyter]
        pass_filenames: true
      - id: ruff-format
        name: ruff-format (via uv)
        entry: uv run ruff format
        language: system
        types_or: [python, pyi, jupyter]
        pass_filenames: true

# Type checking deliberately lives outside pre-commit. The RobertCraigie/pyright
# hook runs pyright in an isolated venv and ships only `additional_dependencies`,
# which makes runtime imports (pandas, pytest, hypothesis, statsmodels, scipy)
# unresolvable — yielding ~50 false-positive `reportMissingImports` errors.
# CI runs `uv run pyright src tests` in the project venv as a dedicated step,
# which is the authoritative type check. Run it locally the same way.
